# fly.toml app configuration file generated for datawrapper-mcp on 2026-03-22T07:40:58-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'datawrapper-mcp'
primary_region = 'ewr'

[build]

[http_service]
internal_port = 8501
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 3

[[http_service.http_options.replay_cache]]
path_prefix = "/"
ttl_seconds = 300
type = "header"
name = "mcp-session-id"

[checks.health]
port = 8501
type = "http"
path = "/healthz"
interval = "10s"
timeout = "2s"
grace_period = "15s"

[[vm]]
size = "performance-1x"
memory = "2048mb"
